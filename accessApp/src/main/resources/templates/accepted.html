<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}"/>
    <title>List of users</title>
    <style>
        .buttonBack {
            color: white;
            border: 3px solid darkolivegreen;
            background-color: darkolivegreen;
            padding: 5px;
            margin: 1px;
            text-decoration-line: none;
            border-radius: 4px;
            font-size: 12px;
        }

        .buttonBack:hover {
            background-color: darkgreen;
            border: 3px solid darkgreen;
        }
    </style>
</head>
<body>
<h3 style="text-align: center;">List of reservations</h3>
<hr>
<span><a class="buttonBack" th:href="@{/reservations}">Back to the reservation page</a></span>
<br>
<br>

<div class="container">
    <table class="table table-bordered table-striped">

        <thead class="table-dark">
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Building</th>
            <th>Office</th>
            <th>StartDate</th>
            <th>EndDate</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="tempReservation : ${reservations}">
            <td th:text="${tempReservation.user.firstName}"></td>
            <td th:text="${tempReservation.user.surname}"></td>
            <td th:text="${tempReservation.user.email}"></td>
            <td>
                <span th:each="t : ${tempReservation.offices}" th:text="${t.building.numOfBuilding}"></span>
            </td>
            <td>
                <span th:each="t : ${tempReservation.offices}" th:text="${t.numOfOffice}"></span>
            </td>
            <td th:text="${tempReservation.startReservation}"></td>
            <td th:text="${tempReservation.endReservation}"></td>

            <!-- Button for update user -->
            <td>
                <!-- Button for delete  -->
                <a th:href="@{/manageReservation/{reservationUuid}/updateForReject(reservationUuid=${tempReservation.uuid})}"
                   class="btn btn-danger btn-sm"
                   onclick="if (!(confirm('Are you sure you want to reject this reservation?'))) return false">
                    Reject
                </a>

            </td>
        </tr>
        </tbody>

    </table>
</div>
</body>
</html>
