<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}"/>
    <title>List of users</title>
    <style>
        .buttonBack {
            color: white;
            border: 3px solid darkolivegreen;
            background-color: darkolivegreen;
            padding: 5px;
            margin: 1px;
            text-decoration-line: none;
            border-radius: 4px;
            font-size: 14px;
        }

        .buttonBack:hover {
            background-color: darkgreen;
            border: 3px solid darkgreen;
        }
    </style>
</head>
<body>
<h3 style="text-align: center;">List of users</h3>
<hr>
<span><a class="buttonBack" style="font-size: 12px" th:href="@{/reservations}">Back to the reservation page</a></span>
<br>
<br>

<!-- Add  buton -->
<a th:href="@{/users/add}"
   class="btn btn-primary btn-sm mb-3">
    Add User
</a>
<div class="container">
    <table class="table table-bordered table-striped">

        <thead class="table-dark">
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Roles</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="tempUser : ${users}">
            <td th:text="${tempUser.firstName}"></td>
            <td th:text="${tempUser.surname}"></td>
            <td th:text="${tempUser.email}"></td>
            <td>
                <span th:each="role : ${tempUser.roles}" th:text="${role.type} + ', '"></span>
            </td>
            <!-- Button for update user -->
            <td>
                <a th:href="@{/users/{userUuid}/update(userUuid=${tempUser.uuid})}"
                   class="btn btn-info btn-sm">
                    Update
                </a>

                <!-- Button for delete  -->
                <a th:href="@{/users/deleteUser(userUuid=${tempUser.uuid})}"
                   class="btn btn-danger btn-sm"
                   onclick="if (!(confirm('Are you sure you want to delete this user?'))) return false">
                    Delete
                </a>

            </td>
        </tr>
        </tbody>

    </table>
</div>
</body>
</html>
