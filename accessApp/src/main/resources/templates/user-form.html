<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}"/>
    <style>
        .buttonBack {
            color: white;
            border: 3px solid darkolivegreen;
            background-color: darkolivegreen;
            padding: 5px;
            margin: 1px;
            text-decoration-line: none;
            border-radius: 4px;
            font-size: 12px;
            width: 90px;
        }

        .buttonBack:hover {
            background-color: darkgreen;
            border: 3px solid darkgreen;
        }
    </style>
</head>

<body>

<div>
    <h3 style="text-align: left">Save User</h3>

    <hr>
    <a class="buttonBack" style="font-size: 12px" th:href="@{/users/list}">Back to Users List</a>
    <br>
    <br>
    <form action="#" th:action="@{/users/saveUser}" th:object="${userDto}" method="POST">

        <!-- hidden form field to handle the update -->
        <div>

            <span th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="error"></span>
            <input type="text" th:field="*{firstName}"
                   class="form-control mb-4 w-25" placeholder="First name">

            <span th:if="${#fields.hasErrors('surname')}" th:errors="*{surname}" class="error"></span>
            <input type="text" th:field="*{surname}"
                   class="form-control mb-4 w-25" placeholder="Last name">

            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error"></span>
            <input type="email" th:field="*{email}"
                   class="form-control mb-4 w-25" placeholder="Email">

            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error"></span>
            <input type="password" th:field="*{password}"
                   class="form-control mb-4 w-25" placeholder="Password">
        </div>

        <span th:if="${#fields.hasErrors('roles')}" th:errors="*{roles}" class="error"></span>
        <div th:each="role, stat : ${allRoles}">
            <input type="checkbox" th:field="*{roles}" th:value="${role.uuid}" name="roles"/>
            <label th:text="${role.type}"></label>
        </div>
        <br>
        <button type="submit" class="btn btn-info btn-sm">Save</button>

    </form>

</div>

</body>

</html>
