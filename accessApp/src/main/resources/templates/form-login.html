<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}"/>
    <title>Login page</title>
    <style>
        .failed {
            color: red;
        }
        .main{
            background-image: linear-gradient(to right, darkseagreen, lightgoldenrodyellow);
            font-family: "Arial", sans-serif;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .item {
            border: 3px;
            padding: 3px;
            margin: 3px;
            display: flex;
            align-content: center;
            justify-content: center;
        }
        .cont {
            display: flex;
            align-content: center;
            justify-content: center;
            margin: 20px;
        }

    </style>
</head>
<body class="main">

<br>
<h3 style="text-align: center; font-weight: bold; font-size: 72px">Access App</h3>
<br>
<br>
<form action="#" th:action="@{/authenticateTheUser}" method="POST">

    <div class="cont">
        <hr>
        <br>
        <p class="item">
            <label style="font-weight: bold" for="username">Email:</label>
            <input type="text" name="username" id="username">
        </p>
        <p class="item">
            <label style="font-weight: bold" for="password">Password:</label>
            <input type="password" name="password" id="password">
        </p>
        <br>
        <input type="submit" value="Login">
    </div>
    <span class="item" style="text-align: center; font-weight: bold;  margin: 10px" th:if="${param.error}">
            <i class="failed item">You entered invalid email/password</i>
    </span>

    <span class="item" style="text-align: center; font-weight: bold; margin: 10px" th:if="${param.logout}">
            <i style="color: green">You have been logged out.</i>
    </span>
    <br>

</form>

</body>
</html>
